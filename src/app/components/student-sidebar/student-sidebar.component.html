<aside class="student-sidebar" [class.open]="mobileOpen">
  <div class="sidebar-overlay" (click)="mobileClose.emit()"></div>

  <div class="sidebar-inner">
    <div class="sidebar-logo">
      <app-brand-logo variant="sidebar" tag="Student" [iconSize]="40"></app-brand-logo>
    </div>

    <nav class="sidebar-nav">
      <button *ngFor="let item of navItems"
              type="button"
              class="nav-item"
              [class.active]="isActive(item)"
              (click)="navigate(item)">
        <span class="nav-icon">
          <ng-container [ngSwitch]="item.icon">
            <svg *ngSwitchCase="'dashboard'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            <svg *ngSwitchCase="'attendance'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <svg *ngSwitchCase="'homework'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            <svg *ngSwitchCase="'assignments'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/></svg>
            <svg *ngSwitchCase="'timetable'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            <svg *ngSwitchCase="'exams'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            <svg *ngSwitchCase="'fees'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            <svg *ngSwitchCase="'ai'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.4V11h2a7 7 0 0 1 7 7h-2.3a4 4 0 0 1-7.4 0H7a7 7 0 0 1 7-7h2V9.4A4 4 0 0 1 12 2z"/></svg>
            <svg *ngSwitchCase="'profile'" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </ng-container>
        </span>
        <span class="nav-label">{{ item.label }}</span>
        <span *ngIf="item.badge" class="nav-badge" [class.ai-badge]="item.badge === 'AI'">{{ item.badge }}</span>
      </button>
    </nav>

    <div class="sidebar-profile">
      <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aarav" alt="" class="profile-avatar" />
      <div class="profile-info">
        <span class="profile-name">{{ studentName }}</span>
        <span class="profile-class">{{ studentClass }}</span>
      </div>
      <button type="button" class="logout-btn" (click)="logout()" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</aside>
