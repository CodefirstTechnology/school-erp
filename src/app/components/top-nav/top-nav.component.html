<header class="top-nav">
  <div class="search-wrapper">
    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" class="search-input" placeholder="Search students, staff, reports..." />
    <kbd class="search-shortcut">⌘K</kbd>
  </div>

  <div class="top-nav-actions">
    <button class="icon-btn" aria-label="Notifications">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <span class="notification-badge">5</span>
    </button>

    <button class="icon-btn" aria-label="Messages">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </button>

    <button class="btn btn-primary ai-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2a4 4 0 0 1 4 4c0 1.5-.8 2.8-2 3.4V11h2a7 7 0 0 1 7 7h-2.3a4 4 0 0 1-7.4 0H7a7 7 0 0 1 7-7h2V9.4A4 4 0 0 1 12 2z"/>
      </svg>
      AI Assistant
    </button>

    <button class="icon-btn theme-toggle" (click)="onDarkModeToggle()" [attr.aria-label]="isDarkMode ? 'Light mode' : 'Dark mode'">
      <svg *ngIf="!isDarkMode" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <svg *ngIf="isDarkMode" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    </button>

    <div class="profile-dropdown">
      <button class="avatar-btn" (click)="toggleProfileMenu()" aria-label="User menu">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin&backgroundColor=c0aede" alt="User" />
      </button>
      <div class="dropdown-menu glass-card" *ngIf="showProfileMenu">
        <div class="dropdown-header">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin&backgroundColor=c0aede" alt="User" />
          <div>
            <span class="dropdown-name">Rajesh Kumar</span>
            <span class="dropdown-email">admin@greenwood.edu</span>
          </div>
        </div>
        <div class="dropdown-divider"></div>
        <a href="#" class="dropdown-item" (click)="$event.preventDefault()">My Profile</a>
        <a href="#" class="dropdown-item" (click)="$event.preventDefault()">Account Settings</a>
        <a href="#" class="dropdown-item" (click)="$event.preventDefault()">Help Center</a>
        <div class="dropdown-divider"></div>
        <a href="#" class="dropdown-item logout" (click)="$event.preventDefault()">Sign Out</a>
      </div>
    </div>
  </div>
</header>
