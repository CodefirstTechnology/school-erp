<div class="student-login-page">
  <div class="ambient-bg" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-layout">
    <!-- Left: Educational Branding -->
    <aside class="brand-panel">
      <div class="brand-inner">
        <div class="logo-row">
          <app-brand-logo variant="auth" tag="Student Portal" [iconSize]="44"></app-brand-logo>
        </div>

        <div class="hero-text">
          <h1>Your learning journey <span>starts here</span></h1>
          <p>Access assignments, grades, timetable, and AI-powered study insights — all in one place.</p>
        </div>

        <div class="edu-illustration">
          <svg viewBox="0 0 360 280" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#C4B5FD"/>
                <stop offset="100%" stop-color="#8B5CF6"/>
              </linearGradient>
            </defs>
            <rect x="60" y="80" width="120" height="90" rx="10" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
            <rect x="72" y="95" width="60" height="5" rx="2" fill="rgba(255,255,255,0.5)"/>
            <rect x="72" y="108" width="90" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
            <rect x="72" y="118" width="75" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
            <circle cx="240" cy="120" r="55" fill="rgba(139,92,246,0.2)" stroke="url(#bookGrad)" stroke-width="2"/>
            <path d="M240 95v-8M240 153v-8M213 120h-8M275 120h-8" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
            <rect x="215" y="105" width="50" height="30" rx="6" fill="url(#bookGrad)" opacity="0.9"/>
            <path d="M225 115h30M225 122h20" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <rect x="100" y="200" width="160" height="50" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
            <text x="120" y="222" fill="white" font-size="10" opacity="0.6">Today&apos;s Classes</text>
            <text x="120" y="240" fill="white" font-size="14" font-weight="700">4 sessions · 92% attendance</text>
          </svg>
        </div>

        <div class="feature-chips">
          <span class="chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg>
            Assignments
          </span>
          <span class="chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
            Grades
          </span>
          <span class="chip">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>
            Timetable
          </span>
        </div>
      </div>
    </aside>

    <!-- Right: Login Form -->
    <main class="form-panel">
      <div class="login-card glass-card">
        <div class="card-header">
          <div class="student-badge">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
              <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"/>
            </svg>
          </div>
          <h2>Student Login</h2>
          <p>Sign in with your Student ID to access your portal</p>
        </div>

        <form (ngSubmit)="login()">
          <div *ngIf="errorMessage" class="error-msg">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {{ errorMessage }}
          </div>

          <div class="field">
            <label for="studentId">Student ID</label>
            <div class="input-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="13" y2="13"/></svg>
              <input
                id="studentId"
                type="text"
                [(ngModel)]="studentId"
                name="studentId"
                placeholder="e.g. STU-10-A-1042"
                autocomplete="username"
              />
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                [(ngModel)]="password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
              />
              <button type="button" class="pw-toggle" (click)="togglePassword()" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
                <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <div class="options-row">
            <label class="remember">
              <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
              <span class="check"></span>
              Remember Me
            </label>
            <a href="#" class="forgot">Forgot Password?</a>
          </div>

          <button type="submit" class="btn-login" [disabled]="isLoading">
            <span *ngIf="!isLoading">Login</span>
            <span *ngIf="isLoading" class="loading">
              <span class="spinner"></span> Signing in...
            </span>
          </button>

          <button type="button" class="btn-back" (click)="backToRoles()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back
          </button>
        </form>
      </div>
    </main>
  </div>
</div>
