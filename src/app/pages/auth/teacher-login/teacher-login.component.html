<div class="teacher-login-page">
  <div class="ambient-bg" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-layout">
    <aside class="brand-panel">
      <div class="brand-inner">
        <div class="logo-row">
          <app-brand-logo variant="auth" tag="Teacher Portal" [iconSize]="44"></app-brand-logo>
        </div>

        <div class="hero-text">
          <h1>Empower every <span>classroom</span></h1>
          <p>Manage classes, attendance, grades, and lesson plans with AI-powered teaching tools.</p>
        </div>

        <div class="edu-illustration">
          <svg viewBox="0 0 360 260" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="teachGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#C4B5FD"/>
                <stop offset="100%" stop-color="#8B5CF6"/>
              </linearGradient>
            </defs>
            <rect x="50" y="70" width="130" height="100" rx="12" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)"/>
            <rect x="65" y="90" width="70" height="6" rx="3" fill="rgba(255,255,255,0.45)"/>
            <rect x="65" y="104" width="100" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
            <rect x="65" y="114" width="85" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
            <circle cx="250" cy="110" r="50" fill="rgba(139,92,246,0.2)" stroke="url(#teachGrad)" stroke-width="2"/>
            <path d="M230 110h40M250 90v40" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
            <rect x="90" y="190" width="180" height="48" rx="10" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)"/>
            <text x="110" y="212" fill="white" font-size="10" opacity="0.6">Today&apos;s Schedule</text>
            <text x="110" y="230" fill="white" font-size="14" font-weight="700">5 classes · 142 students</text>
          </svg>
        </div>

        <div class="feature-chips">
          <span class="chip">Class Management</span>
          <span class="chip">Attendance</span>
          <span class="chip">Gradebook</span>
        </div>
      </div>
    </aside>

    <main class="form-panel">
      <div class="login-card glass-card">
        <div class="card-header">
          <div class="teacher-badge">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
          </div>
          <h2>Teacher Login</h2>
          <p>Sign in with your Employee ID to access the teacher portal</p>
        </div>

        <form (ngSubmit)="login()">
          <div *ngIf="errorMessage" class="error-msg">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {{ errorMessage }}
          </div>

          <div class="field">
            <label for="employeeId">Employee ID</label>
            <div class="input-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="7" y1="9" x2="17" y2="9"/><line x1="7" y1="13" x2="13" y2="13"/></svg>
              <input
                id="employeeId"
                type="text"
                [(ngModel)]="employeeId"
                name="employeeId"
                placeholder="e.g. EMP-2024-001"
                autocomplete="username"
              />
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="input-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input
                id="password"
                [type]="showPassword ? 'text' : 'password'"
                [(ngModel)]="password"
                name="password"
                placeholder="Enter your password"
                autocomplete="current-password"
              />
              <button type="button" class="pw-toggle" (click)="togglePassword()" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
                <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>

          <div class="options-row">
            <label class="remember">
              <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" />
              <span class="check"></span>
              Remember Me
            </label>
            <a href="#" class="forgot">Forgot Password?</a>
          </div>

          <button type="submit" class="btn-login" [disabled]="isLoading">
            <span *ngIf="!isLoading">Login</span>
            <span *ngIf="isLoading" class="loading"><span class="spinner"></span> Signing in...</span>
          </button>

          <button type="button" class="btn-back" (click)="back()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Back
          </button>
        </form>
      </div>
    </main>
  </div>
</div>
