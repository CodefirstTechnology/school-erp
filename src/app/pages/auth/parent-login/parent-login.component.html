<div class="auth-login-page">
  <div class="ambient-bg" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
  <div class="login-layout">
    <aside class="brand-panel">
      <div class="brand-inner">
        <div class="logo-row">
          <app-brand-logo variant="auth" tag="Parent Portal" [iconSize]="44"></app-brand-logo>
        </div>
        <div class="hero-text">
          <h1>Stay connected with your <span>child&apos;s education</span></h1>
          <p>Track attendance, grades, fees, and school updates in real time.</p>
        </div>
        <div class="feature-chips">
          <span class="chip">Child Progress</span>
          <span class="chip">Fee Payments</span>
          <span class="chip">School Alerts</span>
        </div>
      </div>
    </aside>
    <main class="form-panel">
      <div class="login-card glass-card">
        <div class="card-header">
          <div class="role-badge">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>
          </div>
          <h2>Parent Login</h2>
          <p>Sign in with your registered email</p>
        </div>
        <form (ngSubmit)="login()">
          <div *ngIf="errorMessage" class="error-msg">{{ errorMessage }}</div>
          <div class="field">
            <label for="email">Email Address</label>
            <div class="input-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="parent@email.com" autocomplete="username" />
            </div>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <div class="input-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password" name="password" placeholder="Enter your password" autocomplete="current-password" />
              <button type="button" class="pw-toggle" (click)="togglePassword()">
                <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="1" y1="1" x2="23" y2="23"/></svg>
              </button>
            </div>
          </div>
          <div class="options-row">
            <label class="remember"><input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" /><span class="check"></span> Remember Me</label>
            <a href="#" class="forgot">Forgot Password?</a>
          </div>
          <button type="submit" class="btn-login" [disabled]="isLoading"><span *ngIf="!isLoading">Login</span><span *ngIf="isLoading" class="loading"><span class="spinner"></span> Signing in...</span></button>
          <button type="button" class="btn-back" (click)="back()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg> Back</button>
        </form>
      </div>
    </main>
  </div>
</div>
